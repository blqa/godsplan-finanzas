<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>God's Plan | Finanzas</title>
    
    <!-- LIBRERIAS (Estables) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore-compat.js"></script>

    <style>
        /* BASE & TEMA */
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #e5e5e5; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* NAV GLOBAL (NEXUS STYLE) */
        #global-nav { height: 50px; background: #000; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; flex-shrink: 0; z-index: 50; }
        .nav-brand { font-weight: 900; letter-spacing: 1px; color: white; display: flex; align-items: center; gap: 8px; font-size: 0.8rem; text-decoration: none; }
        .nav-links a { color: #666; font-size: 0.75rem; font-weight: 700; text-decoration: none; margin-left: 15px; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: white; }

        /* SCROLL AREA */
        #app-content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; background: linear-gradient(180deg, #0a0a0a 0%, #000000 100%); }

        /* TARJETAS PRINCIPALES */
        .card { background: #121212; border: 1px solid #222; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        
        /* HERO CARD (BALANCE) */
        .hero-card {
            background: linear-gradient(135deg, #171717 0%, #0a0a0a 100%);
            border: 1px solid #333; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: space-between;
            min-height: 180px;
        }
        .hero-card::after { content:''; position: absolute; bottom:0; left:0; width:100%; height:4px; background: #ef4444; }
        
        .label { font-size: 0.65rem; color: #737373; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; margin-bottom: 5px; }
        .amount-xl { font-size: 3.5rem; font-weight: 800; color: white; line-height: 1; letter-spacing: -2px; }
        .amount-md { font-size: 1.5rem; font-weight: 700; color: white; }

        /* LISTAS */
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #18181b; border-radius: 12px; margin-bottom: 8px; border: 1px solid #27272a; transition: transform 0.1s; }
        .list-item:active { transform: scale(0.98); }
        .item-left { display: flex; align-items: center; gap: 12px; }
        .icon-box { width: 36px; height: 36px; border-radius: 10px; background: #27272a; display: flex; align-items: center; justify-content: center; color: #a1a1aa; }
        .item-text h4 { font-weight: 700; font-size: 0.9rem; color: #e5e5e5; }
        .item-text p { font-size: 0.7rem; color: #52525b; }
        .item-amount { font-weight: 700; color: #ef4444; }
        .item-amount.pos { color: #10b981; }

        /* INPUTS */
        .input-group { margin-bottom: 15px; }
        .input-dark { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 15px; border-radius: 12px; font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .input-dark:focus { border-color: #ef4444; }

        /* BOTONES */
        .btn-main { width: 100%; background: #ef4444; color: white; padding: 15px; border-radius: 12px; font-weight: 800; font-size: 1rem; border: none; cursor: pointer; transition: background 0.2s; }
        .btn-main:active { background: #dc2626; transform: scale(0.98); }
        .btn-sec { width: 100%; background: transparent; border: 1px solid #333; color: #a1a1aa; padding: 15px; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 10px; }

        /* MENU INFERIOR */
        .bottom-nav { 
            height: 80px; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); 
            border-top: 1px solid #222; display: grid; grid-template-columns: 1fr 1fr;
            position: fixed; bottom: 0; left: 0; width: 100%; z-index: 40;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #52525b; cursor: pointer; }
        .nav-btn.active { color: #ef4444; }
        .nav-btn i { font-size: 1.8rem; margin-bottom: 4px; }
        .nav-btn span { font-size: 0.6rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        /* MODAL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: none; align-items: flex-end; justify-content: center; backdrop-filter: blur(5px); }
        .modal-overlay.active { display: flex; }
        .sheet { background: #121212; width: 100%; max-width: 600px; border-top-left-radius: 24px; border-top-right-radius: 24px; padding: 25px; border-top: 1px solid #333; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* FAB CENTRAL */
        .fab-center {
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: 65px; height: 65px; background: #ef4444; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 2rem; box-shadow: 0 10px 40px rgba(239, 68, 68, 0.4);
            z-index: 60; border: 4px solid #000; cursor: pointer;
        }
        
        .chip { padding: 8px 12px; background: #27272a; border-radius: 20px; font-size: 0.75rem; color: #a1a1aa; cursor: pointer; border: 1px solid transparent; }
        .chip.active { background: #ef4444; color: white; }
    </style>
</head>
<body>

    <!-- NAVEGACIÓN SUPERIOR -->
    <nav id="global-nav">
        <a href="https://godsplan.site" class="nav-brand"><i class="ph-bold ph-circles-three-plus"></i> NEXUS</a>
        <div class="nav-links">
            <a href="https://adherencia.godsplan.site">ADHERENCIA</a>
            <a href="https://chat.godsplan.site">CHAT</a>
            <a href="#" class="active">FINANZAS</a>
        </div>
    </nav>

    <!-- ÁREA DE CONTENIDO -->
    <div id="app-content">
        
        <!-- VISTA: BALANCE (HOME) -->
        <div id="view-balance">
            <!-- Header Periodo -->
            <div class="flex justify-between items-end mb-6 px-2">
                <div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1">Periodo Actual</p>
                    <h2 class="text-lg font-bold text-white flex items-center gap-2" id="periodDates">...</h2>
                </div>
                <div id="daysLeftBadge" class="text-xs bg-red-900/30 text-red-400 border border-red-900 px-3 py-1 rounded-full font-mono">
                    -- Días
                </div>
            </div>

            <!-- TARJETA MAESTRA -->
            <div class="card hero-card">
                <div>
                    <div class="label">Libre para Hoy</div>
                    <div class="amount-xl" id="dailyFree">--</div>
                </div>
                <div class="flex justify-between items-end mt-4">
                    <div>
                        <div class="label">Total Restante</div>
                        <div class="text-xl font-bold text-gray-300" id="totalFree">--</div>
                    </div>
                    <div class="text-right">
                        <div class="label text-green-500">Ingreso Extra</div>
                        <button onclick="app.openModal('extra')" class="text-xs font-bold text-green-400 bg-green-900/20 px-2 py-1 rounded hover:bg-green-900/40 border border-green-900">+ REGISTRAR</button>
                    </div>
                </div>
            </div>

            <!-- LISTA DE MOVIMIENTOS -->
            <div class="flex justify-between items-center mb-4 mt-8 px-2">
                <span class="label">Movimientos Recientes</span>
                <span class="text-xs font-bold text-red-500" id="todayTotal">$0.00</span>
            </div>
            
            <div id="transactionsList">
                <!-- Se llena con JS -->
            </div>
        </div>

        <!-- VISTA: PLAN (CONFIGURACIÓN) -->
        <div id="view-plan" style="display:none;">
            <h2 class="text-2xl font-black text-white mb-6">Estrategia</h2>
            
            <!-- INGRESO -->
            <div class="card">
                <div class="label text-green-500">Ingreso Neto (Quincenal)</div>
                <input type="number" id="inpIncome" class="input-dark text-center text-2xl font-bold text-green-400 mt-2" placeholder="$0.00" onchange="app.saveConfig()">
            </div>

            <!-- GASTOS FIJOS -->
            <div class="flex justify-between items-center mb-4 px-2">
                <span class="label">Gastos Fijos</span>
                <button onclick="app.openModal('fixed')" class="text-xs bg-white text-black font-bold px-3 py-1 rounded hover:bg-gray-200">+ NUEVO</button>
            </div>
            
            <div id="fixedExpensesList" class="space-y-2 mb-8">
                <!-- Se llena con JS -->
            </div>

            <!-- CUENTA -->
            <div class="card text-center border-gray-800">
                <div id="userStatus" class="font-bold text-gray-400 mb-4">Invitado (Local)</div>
                <button onclick="app.login()" id="btnLogin" class="btn-main bg-blue-600 mb-2">Respaldo Google</button>
                <button onclick="app.reset()" class="text-xs text-red-500 mt-2 hover:underline">Borrar Datos</button>
            </div>
        </div>

    </div>

    <!-- BOTON FLOTANTE (GASTO) -->
    <button class="fab-center" onclick="app.openModal('expense')">
        <i class="ph-bold ph-minus"></i>
    </button>

    <!-- NAVEGACION INFERIOR -->
    <div class="bottom-nav">
        <div class="nav-btn active" onclick="app.switchView('balance')">
            <i class="ph-fill ph-wallet"></i>
            <span>Billetera</span>
        </div>
        <div class="nav-btn" onclick="app.switchView('plan')">
            <i class="ph-bold ph-kanban"></i>
            <span>Plan</span>
        </div>
    </div>

    <!-- MODAL: NUEVO GASTO / EXTRA -->
    <div id="modalSheet" class="modal-overlay">
        <div class="bottom-sheet">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-white" id="modalTitle">Registrar</h3>
                <button onclick="app.closeModal()" class="text-gray-500"><i class="ph-bold ph-x text-xl"></i></button>
            </div>

            <!-- Formulario Gasto/Extra -->
            <div id="formTransaction">
                <div class="text-center mb-6">
                    <input type="number" id="txAmount" class="bg-transparent text-center text-5xl font-black text-white w-full border-none outline-none focus:ring-0" placeholder="$0">
                    <div class="text-xs text-gray-500 mt-2 font-mono">MONTO</div>
                </div>

                <div class="flex gap-2 mb-4 overflow-x-auto" id="chipContainer">
                    <div class="chip" onclick="app.setCategory('Comida', this)">🍔 Comida</div>
                    <div class="chip" onclick="app.setCategory('Transporte', this)">🚕 Transporte</div>
                    <div class="chip" onclick="app.setCategory('Antojo', this)">🍫 Antojo</div>
                    <div class="chip" onclick="app.setCategory('Servicios', this)">💡 Servicios</div>
                </div>

                <input type="text" id="txDesc" class="input-dark mb-4" placeholder="Descripción (Opcional)">
                <button onclick="app.saveTransaction()" class="btn-main">GUARDAR</button>
                <button id="btnDeleteTx" onclick="app.deleteTx()" class="btn-sec hidden text-red-500 border-red-900/50">ELIMINAR</button>
            </div>

            <!-- Formulario Fijo -->
            <div id="formFixed" class="hidden">
                <div class="input-group">
                    <label class="label">Nombre</label>
                    <input type="text" id="fixName" class="input-dark">
                </div>
                <div class="flex gap-4">
                    <div class="input-group w-2/3">
                        <label class="label">Monto</label>
                        <input type="number" id="fixAmount" class="input-dark">
                    </div>
                    <div class="input-group w-1/3">
                        <label class="label">Día Pago</label>
                        <input type="number" id="fixDay" class="input-dark text-center" placeholder="1-31">
                    </div>
                </div>
                <button onclick="app.saveFixed()" class="btn-main">GUARDAR FIJO</button>
                <button id="btnDeleteFix" onclick="app.deleteFixed()" class="btn-sec hidden text-red-500">ELIMINAR</button>
            </div>

        </div>
    </div>

    <script>
        // CONFIG
        const COLLECTION = "godsplan_finanzas_v1";
        const firebaseConfig = { apiKey: "AIzaSyCrHBz94UtgiaYntHCYhC5jNa6auUI63vQ", authDomain: "god-s-plan-d737b.firebaseapp.com", projectId: "god-s-plan-d737b", storageBucket: "god-s-plan-d737b.firebasestorage.app", messagingSenderId: "458198314028", appId: "1:458198314028:web:d62b24cee2d19ee5b47589" };
        
        let auth, db;
        try { firebase.initializeApp(firebaseConfig); auth=firebase.auth(); db=firebase.firestore(); } catch(e){console.error(e);}

        const app = {
            user: null,
            data: { income: 0, fixed: [] }, // fixed: {id, name, amount, day}
            periodLogs: [],
            currentPeriod: { start: null, end: null, daysLeft: 1 },
            mode: 'expense', // 'expense', 'extra', 'fixed'
            editId: null,

            init() {
                auth.onAuthStateChanged(u => {
                    if(u) {
                        this.user = u;
                        this.updateUserUI();
                        this.loadData();
                        this.loadLogs();
                    } else {
                        auth.signInAnonymously();
                    }
                });
                this.calcPeriod();
            },

            // --- PERIOD LOGIC (5 y 20) ---
            calcPeriod() {
                const now = new Date();
                const d = now.getDate();
                const m = now.getMonth();
                const y = now.getFullYear();
                
                let start, end;
                if (d >= 5 && d < 20) {
                    start = new Date(y, m, 5); end = new Date(y, m, 19);
                } else if (d >= 20) {
                    start = new Date(y, m, 20); end = new Date(y, m+1, 4);
                } else {
                    start = new Date(y, m-1, 20); end = new Date(y, m, 4);
                }
                
                // Ajuste visual fin
                end.setHours(23,59,59);
                this.currentPeriod = { 
                    start, end, 
                    daysLeft: Math.max(1, Math.ceil((end - now) / 86400000)) 
                };

                // UI
                const opts = {day:'numeric', month:'short'};
                document.getElementById('periodDates').textContent = `${start.toLocaleDateString('es-ES', opts)} - ${end.toLocaleDateString('es-ES', opts)}`;
                document.getElementById('daysLeftBadge').textContent = `${this.currentPeriod.daysLeft} días restantes`;
            },

            // --- DATA ---
            async loadData() {
                // Config Load
                if(this.user && !this.user.isAnonymous) {
                    const doc = await db.collection(COLLECTION).doc(this.user.uid).get();
                    if(doc.exists) this.data = doc.data();
                } else {
                    const local = localStorage.getItem('gp_fin_config');
                    if(local) this.data = JSON.parse(local);
                }
                if(!this.data.fixed) this.data.fixed = [];
                
                document.getElementById('inpIncome').value = this.data.income || '';
                this.renderFixed();
                this.renderBalance(); // Calc inicial
            },

            saveData() {
                if(this.user && !this.user.isAnonymous) {
                    db.collection(COLLECTION).doc(this.user.uid).set(this.data);
                }
                localStorage.setItem('gp_fin_config', JSON.stringify(this.data));
                this.renderBalance();
            },

            // --- LOGS (Variables) ---
            loadLogs() {
                if(this.user && !this.user.isAnonymous) {
                    db.collection(COLLECTION).doc(this.user.uid).collection('logs')
                      .orderBy('date', 'desc').limit(50)
                      .onSnapshot(s => {
                          this.periodLogs = s.docs.map(d => ({id:d.id, ...d.data()}));
                          this.renderLogs();
                          this.renderBalance();
                      });
                } else {
                    const local = JSON.parse(localStorage.getItem('gp_fin_logs') || '[]');
                    this.periodLogs = local;
                    this.renderLogs();
                    this.renderBalance();
                }
            },

            saveLog(log) {
                if(this.user && !this.user.isAnonymous) {
                    db.collection(COLLECTION).doc(this.user.uid).collection('logs').add(log);
                } else {
                    log.id = Date.now().toString();
                    this.periodLogs.push(log);
                    localStorage.setItem('gp_fin_logs', JSON.stringify(this.periodLogs));
                    this.renderLogs();
                    this.renderBalance();
                }
            },

            updateLog(id, data) {
                if(this.user && !this.user.isAnonymous) {
                    db.collection(COLLECTION).doc(this.user.uid).collection('logs').doc(id).update(data);
                } else {
                    const idx = this.periodLogs.findIndex(l => l.id === id);
                    if(idx !== -1) {
                        this.periodLogs[idx] = {...this.periodLogs[idx], ...data};
                        localStorage.setItem('gp_fin_logs', JSON.stringify(this.periodLogs));
                        this.renderLogs();
                        this.renderBalance();
                    }
                }
            },

            deleteLog(id) {
                if(this.user && !this.user.isAnonymous) {
                    db.collection(COLLECTION).doc(this.user.uid).collection('logs').doc(id).delete();
                } else {
                    this.periodLogs = this.periodLogs.filter(l => l.id !== id);
                    localStorage.setItem('gp_fin_logs', JSON.stringify(this.periodLogs));
                    this.renderLogs();
                    this.renderBalance();
                }
            },

            // --- RENDERING & MATH ---
            renderBalance() {
                // 1. Filtrar Fijos Activos (Si el día de pago cae en el rango)
                const s = this.currentPeriod.start.getDate();
                const isQ1 = s === 5; // 5-19
                
                const activeFixed = this.data.fixed.reduce((sum, item) => {
                    const d = parseInt(item.day);
                    // Q1 (5-19) vs Q2 (20-4) logic
                    const inQ1 = d >= 5 && d <= 19;
                    const inQ2 = d >= 20 || d <= 4;
                    if ((isQ1 && inQ1) || (!isQ1 && inQ2)) return sum + item.amount;
                    return sum;
                }, 0);

                // 2. Filtrar Logs del Periodo
                let spent = 0, extras = 0;
                const pStart = this.currentPeriod.start.getTime();
                const pEnd = this.currentPeriod.end.getTime();

                this.periodLogs.forEach(l => {
                    const time = new Date(l.date).getTime();
                    if(time >= pStart && time <= pEnd) {
                        if(l.type === 'income') extras += l.amount;
                        else spent += l.amount;
                    }
                });

                // 3. Resultado Final
                const income = this.data.income || 0;
                const totalFree = (income + extras) - (activeFixed + spent);
                const daily = totalFree / this.currentPeriod.daysLeft;

                // UI
                const elDaily = document.getElementById('dailyFree');
                elDaily.textContent = this.fmt(daily);
                elDaily.style.color = daily < 0 ? '#ef4444' : 'white';
                
                document.getElementById('totalFree').textContent = this.fmt(totalFree);
                document.getElementById('todayTotal').textContent = `-${this.fmt(spent)}`;
            },

            renderLogs() {
                const list = document.getElementById('transactionsList');
                list.innerHTML = '';
                // Filter current period only for display? No, show recent.
                const recent = this.periodLogs.sort((a,b) => new Date(b.date) - new Date(a.date)).slice(0, 20);

                recent.forEach(l => {
                    const isInc = l.type === 'income';
                    list.innerHTML += `
                    <div class="list-item" onclick="app.openModal('${isInc?'extra':'expense'}', '${l.id}')">
                        <div class="item-left">
                            <div class="icon-box" style="color:${isInc?'#10b981':'#ef4444'}">
                                <i class="ph-fill ${isInc?'ph-money':'ph-shopping-bag'}"></i>
                            </div>
                            <div class="item-text">
                                <h4>${l.desc}</h4>
                                <p>${new Date(l.date).toLocaleDateString()}</p>
                            </div>
                        </div>
                        <div class="item-amount ${isInc?'pos':''}">${isInc?'+':'-'}${this.fmt(l.amount)}</div>
                    </div>`;
                });
            },

            renderFixed() {
                const list = document.getElementById('fixedExpensesList');
                list.innerHTML = '';
                
                // Sort by day
                this.data.fixed.sort((a,b) => a.day - b.day);
                
                // Determine active status for lock icon
                const s = this.currentPeriod.start.getDate();
                const isQ1 = s === 5; 

                this.data.fixed.forEach((f, idx) => {
                    const d = parseInt(f.day);
                    const isActive = (isQ1 && (d>=5 && d<=19)) || (!isQ1 && (d>=20 || d<=4));
                    
                    list.innerHTML += `
                    <div class="list-item" onclick="app.openModal('fixed', ${idx})" style="opacity:${isActive?1:0.5}">
                        <div class="item-left">
                            <div class="icon-box">
                                <i class="ph-fill ${isActive?'ph-lock-key-open':'ph-lock-key'}"></i>
                            </div>
                            <div class="item-text">
                                <h4>${f.name}</h4>
                                <p>Día ${f.day}</p>
                            </div>
                        </div>
                        <div class="item-amount">-${this.fmt(f.amount)}</div>
                    </div>`;
                });
            },

            // --- UI ACTIONS ---
            switchView(v) {
                document.getElementById('view-balance').style.display = v === 'balance' ? 'block' : 'none';
                document.getElementById('view-plan').style.display = v === 'plan' ? 'block' : 'none';
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                
                if(v === 'balance') document.querySelector('.nav-btn:nth-child(1)').classList.add('active');
                if(v === 'plan') document.querySelector('.nav-btn:nth-child(2)').classList.add('active');
                
                // FAB only on balance
                document.querySelector('.fab-center').style.display = v === 'balance' ? 'flex' : 'none';
            },

            openModal(mode, id = null) {
                this.mode = mode;
                this.editId = id;
                const modal = document.getElementById('modalSheet');
                const title = document.getElementById('modalTitle');
                
                // Ocultar todo
                document.getElementById('formTransaction').style.display = 'none';
                document.getElementById('formFixed').style.display = 'none';
                document.getElementById('chipContainer').style.display = 'none';
                document.getElementById('btnDeleteTx').classList.add('hidden');
                document.getElementById('btnDeleteFix').classList.add('hidden');

                if (mode === 'expense' || mode === 'extra') {
                    document.getElementById('formTransaction').style.display = 'block';
                    if (mode === 'expense') {
                        title.textContent = id ? "Editar Gasto" : "Nuevo Gasto";
                        document.getElementById('chipContainer').style.display = 'flex';
                        document.getElementById('txAmount').classList.remove('text-green-500');
                    } else {
                        title.textContent = id ? "Editar Extra" : "Ingreso Extra";
                        document.getElementById('txAmount').classList.add('text-green-500');
                    }
                    
                    // Pre-fill if edit
                    if (id) {
                        const item = this.periodLogs.find(l => l.id === id);
                        document.getElementById('txAmount').value = item.amount;
                        document.getElementById('txDesc').value = item.desc;
                        document.getElementById('btnDeleteTx').classList.remove('hidden');
                    } else {
                        document.getElementById('txAmount').value = '';
                        document.getElementById('txDesc').value = '';
                    }
                    setTimeout(()=>document.getElementById('txAmount').focus(), 100);

                } else if (mode === 'fixed') {
                    document.getElementById('formFixed').style.display = 'block';
                    title.textContent = id !== null ? "Editar Fijo" : "Nuevo Fijo";
                    
                    if (id !== null) {
                        const item = this.data.fixed[id];
                        document.getElementById('fixName').value = item.name;
                        document.getElementById('fixAmount').value = item.amount;
                        document.getElementById('fixDay').value = item.day;
                        document.getElementById('btnDeleteFix').classList.remove('hidden');
                    } else {
                        document.getElementById('fixName').value = '';
                        document.getElementById('fixAmount').value = '';
                        document.getElementById('fixDay').value = '';
                    }
                }
                
                modal.classList.add('active');
            },

            closeModal() { document.getElementById('modalSheet').classList.remove('active'); },

            setCategory(t, el) {
                document.getElementById('txDesc').value = t;
                document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
                el.classList.add('active');
            },

            saveTransaction() {
                const amt = parseFloat(document.getElementById('txAmount').value);
                const desc = document.getElementById('txDesc').value || (this.mode === 'extra' ? 'Ingreso Extra' : 'Gasto');
                
                if(!amt) return;

                const data = {
                    amount: amt,
                    desc: desc,
                    type: this.mode === 'extra' ? 'income' : 'expense',
                    date: new Date().toISOString() // Or keep original date if editing? For now overwrite date to bring to top or keep simple
                };
                // If editing, keep original date
                if(this.editId) {
                     const original = this.periodLogs.find(l => l.id === this.editId);
                     data.date = original.date;
                     this.updateLog(this.editId, data);
                } else {
                    this.saveLog(data);
                }
                this.closeModal();
            },

            saveFixed() {
                const name = document.getElementById('fixName').value;
                const amount = parseFloat(document.getElementById('fixAmount').value);
                const day = parseInt(document.getElementById('fixDay').value);
                
                if(!name || !amount) return;

                if (this.editId !== null) {
                    this.data.fixed[this.editId] = { name, amount, day };
                } else {
                    this.data.fixed.push({ name, amount, day });
                }
                this.saveData();
                this.renderFixed();
                this.closeModal();
            },

            deleteTx() {
                if(confirm("¿Eliminar?")) { this.deleteLog(this.editId); this.closeModal(); }
            },
            deleteFix() {
                if(confirm("¿Eliminar?")) { this.data.fixed.splice(this.editId, 1); this.saveData(); this.renderFixed(); this.closeModal(); }
            },
            
            saveConfig() {
                this.data.income = parseFloat(document.getElementById('inpIncome').value) || 0;
                this.saveData();
            },

            // UTILS
            login() { const p = new firebase.auth.GoogleAuthProvider(); auth.signInWithPopup(p).catch(e=>alert(e.message)); },
            logout() { auth.signOut(); location.reload(); },
            reset() { if(confirm("Borrar todo?")) { localStorage.clear(); if(this.user.uid) db.collection(COLLECTION).doc(this.user.uid).delete(); location.reload(); }},
            
            updateUserUI() {
                const u = this.user;
                document.getElementById('userStatus').textContent = u.isAnonymous ? "Modo Local" : `Hola, ${u.displayName}`;
                document.getElementById('btnLogin').style.display = u.isAnonymous ? 'block' : 'none';
            },

            fmt(n) { if(isNaN(n)) return "$0.00"; return "$" + n.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,'); }
        };

        document.addEventListener('DOMContentLoaded', ()=>app.init());
    </script>
</body>
</html>
